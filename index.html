<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>AME Figures | Catálogo Exclusivo de Figuras Coleccionables</title>

    <!-- Meta tags para SEO y compartir -->
    <meta name="description"
        content="AME Figures - Tu tienda de figuras coleccionables de Dragon Ball, One Piece, Pokémon, Marvel y más. Los mejores precios y la mejor calidad.">
    <meta name="keywords"
        content="figuras coleccionables, dragon ball, one piece, pokemon, marvel, anime figures, figuras de acción">
    <meta name="author" content="AME Figures">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="AME Figures - Figuras Coleccionables">
    <meta property="og:description" content="Descubre nuestra colección exclusiva de figuras de anime y cómics">
    <meta property="og:image" content="https://i.postimg.cc/HLx7xyT0/goku-ss.jpg">

    <!-- Font Awesome 6 (iconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts - Poppins para texto y Montserrat para títulos -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- AOS (Animate on Scroll) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Swiper (Carrusel táctil) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- SweetAlert2 (para visor de imágenes) -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        /* ============================================
           RESET Y VARIABLES GLOBALES
        ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b00;
            --primary-dark: #e65100;
            --primary-light: #ff8a3c;
            --secondary: #ff3300;
            --dark: #0a0a0a;
            --dark-light: #1a1a1a;
            --dark-lighter: #2a2a2a;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --text-dark: #888888;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --gradient-hover: linear-gradient(135deg, var(--secondary), var(--primary));
            --shadow: 0 10px 30px rgba(255, 107, 0, 0.2);
            --shadow-hover: 0 20px 40px rgba(255, 107, 0, 0.3);
            --border-radius-sm: 12px;
            --border-radius-md: 20px;
            --border-radius-lg: 30px;
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* ============================================
           EFECTOS DE FONDO ANIMADOS
        ============================================ */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wNSIgLz48L3N2Zz4=');
            opacity: 0.4;
            pointer-events: none;
            z-index: -1;
        }

        .gradient-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255, 107, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(255, 51, 0, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: -2;
            pointer-events: none;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================
           SCROLL PERSONALIZADO
        ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        /* ============================================
           HEADER PRINCIPAL
        ============================================ */
        .main-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 107, 0, 0.3);
            transition: var(--transition);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        /* Logo */
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            transform: rotate(0deg);
            transition: var(--transition);
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .logo-icon:hover::before {
            transform: translateX(100%);
        }

        .logo-icon:hover {
            transform: rotate(10deg) scale(1.1);
        }

        .logo-text {
            line-height: 1.2;
        }

        .logo-text h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .logo-text p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Barra de búsqueda */
        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 18px;
            transition: var(--transition);
            z-index: 1;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 107, 0, 0.1);
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.3);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }

        /* ============================================
           CARRITO CON PREVIEW (NUEVO)
        ============================================ */
        .cart-wrapper {
            position: relative;
        }

        .cart-button {
            width: 60px;
            height: 60px;
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 24px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .cart-button::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            top: 100%;
            left: 0;
            transition: var(--transition);
            z-index: -1;
        }

        .cart-button:hover {
            color: white;
            transform: scale(1.1) rotate(360deg);
        }

        .cart-button:hover::before {
            top: 0;
        }

        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gradient);
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            border: 2px solid var(--dark);
            animation: pulse 2s infinite;
        }

        /* Preview del carrito */
        .cart-preview {
            position: absolute;
            top: 70px;
            right: 0;
            width: 320px;
            background: var(--dark-light);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .cart-wrapper:hover .cart-preview {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 107, 0, 0.3);
            color: white;
            font-size: 14px;
        }

        .preview-header span:last-child {
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
        }

        .preview-header span:last-child:hover {
            text-decoration: underline;
        }

        .preview-items {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .preview-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-item:last-child {
            border-bottom: none;
        }

        .preview-item-image {
            width: 50px;
            height: 50px;
            background: var(--gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .preview-item-info {
            flex: 1;
        }

        .preview-item-title {
            font-size: 13px;
            font-weight: 500;
            color: white;
            margin-bottom: 4px;
        }

        .preview-item-price {
            font-size: 12px;
            color: var(--primary);
        }

        .preview-item-quantity {
            color: #888;
            font-size: 12px;
        }

        .preview-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 107, 0, 0.3);
            color: white;
            font-weight: bold;
        }

        .preview-total {
            color: var(--primary);
            font-size: 18px;
        }

        /* ============================================
           CATEGORÍAS CON SCROLL AUTOMÁTICO Y DISEÑO ELEGANTE
        ============================================ */
        .filters-section {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255, 107, 0, 0.3);
            position: sticky;
            top: 90px;
            z-index: 90;
            padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .filters-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
        }

        /* Contenedor de categorías con efecto de desvanecimiento en los bordes */
        .categories-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 20px, black calc(100% - 20px), transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 20px, black calc(100% - 20px), transparent);
        }

        .categories-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            scroll-behavior: smooth;
            animation: scrollAuto 30s linear infinite;
            cursor: grab;
            width: max-content;
        }

        .categories-scroll:active {
            cursor: grabbing;
            animation-play-state: paused;
        }

        .categories-scroll:hover {
            animation-play-state: paused;
        }

        /* Animación de scroll automático */
        @keyframes scrollAuto {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(calc(-50% - 6px));
            }
        }

        /* Estilo del scrollbar personalizado */
        .categories-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .categories-scroll::-webkit-scrollbar-track {
            background: rgba(255, 107, 0, 0.1);
            border-radius: 10px;
        }

        .categories-scroll::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.5);
        }

        .categories-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.8);
        }

        /* Botones de categoría con efecto 3D */
        .category-btn {
            padding: 12px 28px;
            background: rgba(255, 107, 0, 0.08);
            border: 2px solid rgba(255, 107, 0, 0.3);
            border-radius: 40px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Efecto de brillo en los bordes */
        .category-btn::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--primary));
            border-radius: 40px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .category-btn:hover::before {
            opacity: 0.3;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Iconos dentro de los botones */
        .category-btn i {
            color: var(--primary);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        /* Efecto hover principal */
        .category-btn:hover {
            background: var(--gradient);
            border-color: transparent;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 107, 0, 0.4);
        }

        .category-btn:hover i {
            color: white;
            transform: rotate(360deg);
        }

        /* Botón activo */
        .category-btn.active {
            background: var(--gradient);
            border-color: transparent;
            color: white;
            box-shadow: 0 10px 25px rgba(255, 107, 0, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 10px 25px rgba(255, 107, 0, 0.5);
            }

            50% {
                box-shadow: 0 15px 35px rgba(255, 107, 0, 0.8);
            }
        }

        .category-btn.active i {
            color: white;
            transform: scale(1.1);
        }

        /* Selector de ordenamiento */
        .sort-wrapper {
            position: relative;
            min-width: 180px;
        }

        .sort-select {
            width: 100%;
            padding: 12px 25px;
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid var(--primary);
            border-radius: 40px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .sort-select:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(255, 107, 0, 0.4);
        }

        .sort-wrapper::after {
            content: '\f078';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .sort-select:hover+::after {
            color: white;
            transform: translateY(-50%) rotate(180deg);
        }

        /* Badge para múltiples imágenes */
        .multi-image-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--gradient);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        /* Estilo para la imagen en SweetAlert */
        .swal-image-zoom {
            border-radius: 20px;
            border: 3px solid var(--primary);
            max-height: 70vh;
            object-fit: contain;
            background: #0a0a0a;
        }

        .swal2-popup {
            border-radius: 30px !important;
            border: 2px solid var(--primary) !important;
        }

        .swal2-close {
            color: var(--primary) !important;
            font-size: 40px !important;
        }

        .swal2-close:hover {
            color: white !important;
        }

        .swal2-deny,
        .swal2-cancel {
            font-size: 14px !important;
            padding: 10px 20px !important;
            border-radius: 30px !important;
        }

        /* ============================================
           RESPONSIVE PARA CATEGORÍAS
        ============================================ */
        @media (max-width: 992px) {
            .filters-wrapper {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
                padding: 0 20px;
            }

            .categories-container {
                width: 100%;
            }

            .categories-scroll {
                animation: scrollAuto 20s linear infinite;
            }

            .sort-wrapper {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .filters-section {
                top: 80px;
                padding: 10px 0;
            }

            .category-btn {
                padding: 10px 22px;
                font-size: 13px;
            }

            .category-btn i {
                font-size: 12px;
            }

            .categories-scroll {
                animation: scrollAuto 15s linear infinite;
            }
        }

        @media (max-width: 480px) {
            .filters-wrapper {
                padding: 0 15px;
            }

            .category-btn {
                padding: 8px 18px;
                font-size: 12px;
            }

            .categories-scroll {
                animation: scrollAuto 12s linear infinite;
            }
        }

        /* ============================================
           BANNER DE OFERTAS
        ============================================ */
        .offer-banner {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 30px;
        }

        .swiper {
            width: 100%;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .swiper-slide {
            position: relative;
            height: 300px;
            background: var(--gradient);
            overflow: hidden;
        }

        .slide-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
            color: white;
        }

        .slide-content h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }

        .slide-content p {
            font-size: 18px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .slide-btn {
            display: inline-block;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            width: fit-content;
            cursor: pointer;
        }

        .slide-btn:hover {
            background: white;
            color: var(--primary);
            transform: translateY(-3px);
        }

        .slide-bg {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: url('https://i.postimg.cc/HLx7xyT0/goku-ss.jpg') no-repeat center/cover;
            opacity: 0.2;
            mask-image: linear-gradient(to left, transparent, black);
        }

        /* ============================================
           GRID DE PRODUCTOS
        ============================================ */
        .products-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            padding-left: 20px;
        }

        .section-header h2::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 40px;
            background: var(--gradient);
            border-radius: 5px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Tarjeta de producto */
        .product-card {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 0, 0.2);
            border-radius: var(--border-radius-md);
            overflow: hidden;
            transition: var(--transition);
            position: relative;
            animation: fadeInUp 0.6s ease;
            transform-origin: center;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }

        /* Badges del producto */
        .product-badges {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
            flex-wrap: wrap;
            gap: 5px;
        }

        .badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            animation: badgeGlow 2s infinite;
        }

        @keyframes badgeGlow {

            0%,
            100% {
                box-shadow: 0 5px 15px rgba(255, 107, 0, 0.3);
            }

            50% {
                box-shadow: 0 10px 25px rgba(255, 107, 0, 0.6);
            }
        }

        .badge.discount {
            background: var(--gradient);
            color: white;
        }

        .badge.stock {
            background: rgba(0, 0, 0, 0.8);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .badge.set {
            background: var(--gradient);
            color: white;
        }

        /* Imagen del producto */
        .product-image {
            height: 250px;
            background: linear-gradient(135deg, var(--dark-light), var(--dark-lighter));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .product-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 107, 0, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .product-card:hover .product-image::after {
            transform: translateX(100%);
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .product-card:hover .product-image img {
            transform: scale(1.15);
        }

        .product-image .placeholder-icon {
            font-size: 80px;
            color: var(--primary);
            opacity: 0.5;
            transition: var(--transition);
        }

        .product-card:hover .placeholder-icon {
            transform: scale(1.2);
            opacity: 1;
        }

        /* Información del producto */
        .product-info {
            padding: 20px;
        }

        .product-sku {
            color: var(--primary);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: white;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 50px;
        }

        .product-details {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 107, 0, 0.2);
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
            flex-wrap: wrap;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .detail-item i {
            color: var(--primary);
            font-size: 14px;
        }

        /* Precios */
        .price-wrapper {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .offer-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
        }

        .inflated-price {
            font-size: 16px;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .discount-tag {
            background: var(--gradient);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        /* Botones de acción */
        .product-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-add,
        .btn-whatsapp {
            padding: 14px 0;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-add {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-add::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--gradient);
            top: 100%;
            left: 0;
            transition: var(--transition);
            z-index: -1;
        }

        .btn-add:hover {
            color: white;
            border-color: transparent;
        }

        .btn-add:hover::before {
            top: 0;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            border: 2px solid #25D366;
        }

        .btn-whatsapp:hover {
            background: #128C7E;
            border-color: #128C7E;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-add:hover,
        .btn-whatsapp:hover {
            transform: translateY(-3px);
        }

        /* ============================================
           MODAL DEL CARRITO
        ============================================ */
        .cart-modal {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto;
        }

        .cart-modal.active {
            right: 0;
        }

        .cart-container {
            max-width: 500px;
            margin-left: auto;
            background: var(--dark-light);
            min-height: 100vh;
            padding: 30px;
            border-left: 2px solid var(--primary);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .cart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 107, 0, 0.3);
        }

        .cart-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .close-cart {
            width: 45px;
            height: 45px;
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid var(--primary);
            border-radius: 50%;
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-cart:hover {
            background: var(--primary);
            color: white;
            transform: rotate(90deg);
        }

        .cart-items {
            margin-bottom: 30px;
        }

        .cart-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 107, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-info {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .cart-item-image {
            width: 70px;
            height: 70px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 30px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
        }

        .cart-item-sku {
            color: var(--primary);
            font-size: 11px;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: bold;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .qty-btn {
            width: 35px;
            height: 35px;
            background: transparent;
            border: 2px solid var(--primary);
            border-radius: 50%;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        .item-total {
            color: var(--primary);
            font-weight: bold;
            font-size: 16px;
        }

        .cart-footer {
            position: sticky;
            bottom: 0;
            background: var(--dark-light);
            padding-top: 20px;
            border-top: 2px solid rgba(255, 107, 0, 0.3);
        }

        .cart-total {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .total-amount {
            font-size: 32px;
            color: var(--primary);
            font-family: 'Montserrat', sans-serif;
        }

        .cart-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-whatsapp-checkout,
        .btn-clear-cart {
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
        }

        .btn-whatsapp-checkout {
            background: #25D366;
            color: white;
        }

        .btn-clear-cart {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-whatsapp-checkout:hover {
            background: #128C7E;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .btn-clear-cart:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart i {
            font-size: 80px;
            color: var(--primary);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-cart h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: white;
        }

        .empty-cart p {
            color: var(--text-muted);
        }

        /* ============================================
           WHATSAPP FLOTANTE
        ============================================ */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 35px;
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
            cursor: pointer;
            transition: var(--transition);
            z-index: 100;
            border: 3px solid var(--dark);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .whatsapp-float:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.6);
        }

        /* ============================================
           SCROLL TO TOP
        ============================================ */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            visibility: hidden;
            z-index: 100;
            border: 2px solid var(--dark);
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: var(--shadow-hover);
        }

        /* ============================================
           TOAST NOTIFICATIONS
        ============================================ */
        .toast-container {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            pointer-events: none;
            width: 90%;
            max-width: 400px;
        }

        .toast {
            background: var(--dark-light);
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 16px 20px;
            margin-top: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(100px);
            animation: slideUp 0.3s forwards;
            pointer-events: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 0, 0.3);
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
            }
        }

        .toast i {
            color: var(--primary);
            font-size: 24px;
        }

        .toast.success {
            border-left-color: #25D366;
        }

        .toast.success i {
            color: #25D366;
        }

        .toast.error {
            border-left-color: #ff3333;
        }

        .toast.error i {
            color: #ff3333;
        }

        /* ============================================
           RESPONSIVE DESIGN
        ============================================ */
        @media (max-width: 1200px) {

            .header-container,
            .filters-wrapper,
            .products-section,
            .offer-banner {
                padding-left: 20px;
                padding-right: 20px;
            }
        }

        @media (max-width: 992px) {
            .logo-text h1 {
                font-size: 24px;
            }

            .slide-content h2 {
                font-size: 36px;
            }

            .filters-wrapper {
                flex-direction: column;
            }

            .categories-carousel {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                padding: 12px 15px;
                flex-wrap: wrap;
            }

            .logo-wrapper {
                width: auto;
            }

            .logo-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .logo-text h1 {
                font-size: 20px;
            }

            .logo-text p {
                font-size: 10px;
            }

            .search-container {
                order: 3;
                max-width: 100%;
                width: 100%;
                margin-top: 10px;
            }

            .categories-carousel {
                padding: 0 35px;
            }

            .sort-wrapper {
                width: 100%;
            }

            .category-slide {
                padding: 10px 20px;
                font-size: 13px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 15px;
            }

            .product-image {
                height: 180px;
            }

            .product-info {
                padding: 15px;
            }

            .product-title {
                font-size: 14px;
                min-height: 40px;
            }

            .product-details {
                gap: 10px;
                font-size: 11px;
            }

            .offer-price {
                font-size: 18px;
            }

            .inflated-price {
                font-size: 12px;
            }

            .discount-tag {
                padding: 3px 8px;
                font-size: 10px;
            }

            .btn-add,
            .btn-whatsapp {
                padding: 10px 0;
                font-size: 12px;
            }

            .cart-container {
                width: 100%;
                padding: 20px;
            }

            .slide-content {
                padding: 30px;
            }

            .slide-content h2 {
                font-size: 28px;
            }

            .slide-content p {
                font-size: 14px;
            }

            .slide-btn {
                padding: 12px 25px;
                font-size: 14px;
            }

            .cart-preview {
                width: 280px;
                right: -20px;
            }

            .whatsapp-float {
                width: 60px;
                height: 60px;
                font-size: 30px;
                bottom: 20px;
                right: 20px;
            }

            .scroll-top {
                width: 45px;
                height: 45px;
                font-size: 18px;
                bottom: 20px;
                left: 20px;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .product-image {
                height: 150px;
            }

            .product-title {
                font-size: 13px;
                -webkit-line-clamp: 2;
            }

            .product-details {
                flex-wrap: wrap;
                gap: 5px;
            }

            .detail-item {
                font-size: 10px;
            }

            .btn-add,
            .btn-whatsapp {
                padding: 8px 0;
                font-size: 11px;
            }

            .badge {
                padding: 4px 10px;
                font-size: 10px;
            }

            .cart-preview {
                position: fixed;
                top: auto;
                bottom: 80px;
                right: 10px;
                left: 10px;
                width: auto;
            }
        }

        /* Loading spinner */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(255, 107, 0, 0.2);
            border-top: 5px solid var(--primary);
            border-right: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- Loader -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Efectos de fondo -->
    <div class="noise"></div>
    <div class="gradient-bg"></div>

    <!-- HEADER -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-wrapper">
                <div class="logo-icon">
                    <i class="fas fa-dragon"></i>
                </div>
                <div class="logo-text">
                    <h1>AME FIGURES</h1>
                    <p>Colección Premium</p>
                </div>
            </div>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por nombre, SKU o categoría...">
                </div>
            </div>

            <!-- Carrito con preview -->
            <div class="cart-wrapper">
                <div class="cart-button" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>

                <!-- Preview del carrito -->
                <div class="cart-preview" id="cartPreview">
                    <div class="preview-header">
                        <span>Últimos añadidos</span>
                        <span onclick="toggleCart()">Ver carrito completo →</span>
                    </div>
                    <div class="preview-items" id="cartPreviewItems"></div>
                    <div class="preview-footer">
                        <span>Total:</span>
                        <span class="preview-total" id="cartPreviewTotal">S/ 0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- FILTROS Y CATEGORÍAS CON SCROLL AUTOMÁTICO -->
    <div class="filters-section">
        <div class="filters-wrapper">
            <!-- Contenedor con efecto de desvanecimiento -->
            <div class="categories-container">
                <div class="categories-scroll" id="categoriesContainer">
                    <!-- Las categorías se generarán con JavaScript -->
                </div>
            </div>

            <!-- Selector de ordenamiento -->
            <div class="sort-wrapper">
                <select class="sort-select" id="sortSelect">
                    <option value="recomendados">Recomendados</option>
                    <option value="menor-precio">Menor precio</option>
                    <option value="mayor-precio">Mayor precio</option>
                    <option value="nombre">Nombre A-Z</option>
                </select>
            </div>
        </div>
    </div>

    <!-- BANNER DE OFERTAS CON BOTONES FUNCIONALES -->
    <div class="offer-banner">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="slide-content">
                        <h2>¡OFERTAS ESPECIALES!</h2>
                        <p>Hasta 15% de descuento en figuras seleccionadas</p>
                        <span class="slide-btn" onclick="verOfertas()">Ver ofertas</span>
                    </div>
                    <div class="slide-bg"></div>
                </div>
                <div class="swiper-slide">
                    <div class="slide-content">
                        <h2>NUEVOS INGRESOS</h2>
                        <p>Demon Slayer, One Piece y más</p>
                        <span class="slide-btn" onclick="verNovedades()">Ver novedades</span>
                    </div>
                    <div class="slide-bg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PRODUCTOS -->
    <section class="products-section">
        <div class="section-header">
            <h2>Catálogo de Figuras</h2>
            <span class="products-count" id="productsCount">0 productos</span>
        </div>

    <script>
        // Inicialización de librerías
        document.addEventListener('DOMContentLoaded', function () {
            // Inicializar AOS
            AOS.init({
                duration: 800,
                once: true,
                offset: 50
            });

            // Inicializar Swiper principal
            new Swiper('.swiper:not(.categories-swiper)', {
                loop: true,
                autoplay: {
                    delay: 5000,
                    disableOnInteraction: false,
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                },
            });

            // Ocultar loader después de 1 segundo
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        });
    </script>
